version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  rewrites:
    - source: /api/*
      target: https://euwheigeak.execute-api.us-east-1.amazonaws.com/prod/{*}
      status: 200
    - source: /assets/*
      target: /assets/*
      status: 200
    - source: '*.js'
      target: '*.js'
      status: 200
    - source: '*.css'
      target: '*.css'
      status: 200
    - source: '*.json'
      target: '*.json'
      status: 200
    - source: '*.png'
      target: '*.png'
      status: 200
    - source: '*.jpg'
      target: '*.jpg'
      status: 200
    - source: '*.svg'
      target: '*.svg'
      status: 200
    - source: '*.ico'
      target: '*.ico'
      status: 200
    - source: '/<*>'
      target: /index.html
      status: 200
